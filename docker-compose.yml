version: '3.9'

# ProWay Lab — Development stack
# Usage: docker compose up -d
# App:        http://localhost:8080
# phpMyAdmin: http://localhost:8081  (root / root_password)

services:

  app:
    build:
      context: .
      target: production
    container_name: proway-app
    ports:
      - "8080:80"
    volumes:
      # Live reload: bind-mount source files (overrides the Docker COPY)
      - ./api:/var/www/html/api
      - ./images:/var/www/html/images
      - ./.htaccess:/var/www/html/.htaccess
    environment:
      APP_ENV: development
      DB_HOST: mysql
      DB_NAME: prowaylab_db
      DB_USER: proway
      DB_PASS: proway_dev_pass
      DB_CHARSET: utf8mb4
      TOKEN_EXPIRY_CLIENT: 168
      TOKEN_EXPIRY_ADMIN: 8
      API_SECRET: dev_secret_change_in_production
      WOMPI_TEST_MODE: "true"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - proway-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: proway-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: prowaylab_db
      MYSQL_USER: proway
      MYSQL_PASSWORD: proway_dev_pass
    volumes:
      - mysql-data:/var/lib/mysql
      - ./api/setup:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "proway", "-pproway_dev_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proway-net
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: proway-pma
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - proway-net
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local

networks:
  proway-net:
    driver: bridge
