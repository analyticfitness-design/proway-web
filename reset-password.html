<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - ProWay Lab</title>
    <link rel="stylesheet" href="/css/proway-base.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0C0C0F;
            --surface: #111114;
            --border: #252528;
            --blue: #00D9FF;
            --blue-hover: #00b8d9;
            --text: #E8E8EA;
            --text-muted: #888890;
            --error: #E31E24;
            --success: #22C55E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            width: 100%;
            max-width: 420px;
        }

        .reset-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--blue);
            padding: 40px 32px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--blue);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .reset-card h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 18px;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Roboto Mono', monospace;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.1s linear;
        }

        .form-group input:focus {
            border-color: var(--blue);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--blue);
            color: #000;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.1s linear;
            margin-top: 6px;
        }

        .btn-submit:hover {
            background: var(--blue-hover);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
            border-left: 3px solid;
        }

        .message.error {
            background: rgba(227, 30, 36, 0.1);
            border-color: var(--error);
            color: #f87171;
            display: block;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success);
            color: #4ade80;
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--blue);
        }

        .password-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-family: 'Roboto Mono', monospace;
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="logo">PROWAY LAB</div>

            <!-- Forgot Password Form (no token) -->
            <div id="forgotForm" style="display:none;">
                <h1>Recuperar Contraseña</h1>
                <p class="subtitle">Ingresa tu email y te enviaremos instrucciones para restablecer tu contraseña.</p>
                <div id="forgotMessage" class="message"></div>
                <form id="forgotFormEl">
                    <div class="form-group">
                        <label for="forgotEmail">Email</label>
                        <input type="email" id="forgotEmail" name="email" required placeholder="tu@email.com" autocomplete="email">
                    </div>
                    <button type="submit" class="btn-submit" id="forgotBtn">Enviar instrucciones</button>
                </form>
            </div>

            <!-- Reset Password Form (with token) -->
            <div id="resetForm" style="display:none;">
                <h1>Nueva Contraseña</h1>
                <p class="subtitle">Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
                <div id="resetMessage" class="message"></div>
                <form id="resetFormEl">
                    <div class="form-group">
                        <label for="resetPassword">Nueva contraseña</label>
                        <input type="password" id="resetPassword" name="password" required minlength="8" placeholder="Minimo 8 caracteres" autocomplete="new-password">
                        <div class="password-hint">min. 8 caracteres</div>
                    </div>
                    <div class="form-group">
                        <label for="resetConfirm">Confirmar contraseña</label>
                        <input type="password" id="resetConfirm" name="confirm" required minlength="8" placeholder="Repite la contraseña" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-submit" id="resetBtn">Actualizar contraseña</button>
                </form>
            </div>
        </div>

        <a href="/login-cliente.html" class="back-link">Volver al inicio de sesion</a>
    </div>

    <script>
    (function() {
        'use strict';

        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');

        var forgotForm = document.getElementById('forgotForm');
        var resetForm = document.getElementById('resetForm');

        // Show appropriate form
        if (token) {
            resetForm.style.display = 'block';
        } else {
            forgotForm.style.display = 'block';
        }

        // --- Forgot Password ---
        function showForgotMessage(text, type) {
            var el = document.getElementById('forgotMessage');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        document.getElementById('forgotFormEl').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('forgotBtn');
            var email = document.getElementById('forgotEmail').value.trim();

            if (!email) return;

            btn.disabled = true;
            btn.textContent = 'Enviando...';

            fetch('/api/auth/forgot-password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    showForgotMessage(data.error, 'error');
                } else {
                    showForgotMessage(data.message || 'Revisa tu email.', 'success');
                    document.getElementById('forgotFormEl').reset();
                }
            })
            .catch(function() {
                showForgotMessage('Error de conexion. Intenta de nuevo.', 'error');
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = 'Enviar instrucciones';
            });
        });

        // --- Reset Password ---
        function showResetMessage(text, type) {
            var el = document.getElementById('resetMessage');
            el.textContent = text;
            el.className = 'message ' + type;
        }

        document.getElementById('resetFormEl').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('resetBtn');
            var password = document.getElementById('resetPassword').value;
            var confirm = document.getElementById('resetConfirm').value;

            if (password.length < 8) {
                showResetMessage('La contraseña debe tener al menos 8 caracteres.', 'error');
                return;
            }

            if (password !== confirm) {
                showResetMessage('Las contraseñas no coinciden.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Actualizando...';

            fetch('/api/auth/reset-password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    showResetMessage(data.error, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Actualizar contraseña';
                } else {
                    showResetMessage(data.message || 'Contraseña actualizada.', 'success');
                    document.getElementById('resetFormEl').reset();
                    btn.textContent = 'Listo';
                    // Redirect to login after 2 seconds
                    setTimeout(function() {
                        window.location.href = '/login-cliente.html';
                    }, 2000);
                }
            })
            .catch(function() {
                showResetMessage('Error de conexion. Intenta de nuevo.', 'error');
                btn.disabled = false;
                btn.textContent = 'Actualizar contraseña';
            });
        });
    })();
    </script>
</body>
</html>
