<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0C0C0F">
    <title>Onboarding — ProWay Lab</title>
    <meta name="description" content="Configura tu perfil de marca en ProWay Lab">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/imagotipo-proway-blanco.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/images/pwa-icon-192.png">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ProWay Design System -->
    <link rel="stylesheet" href="/dist/assets/module.css?v=3">

</head>
<body>
    <div id="toast-container" aria-live="polite"></div>

    <!-- PWA Install Banner -->
    <div x-data="pwaInstall" x-show="canInstall" x-transition.opacity
         style="position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:9999;
                background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid rgba(0,217,255,.25);
                border-radius:.75rem;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.75rem;
                box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:calc(100vw - 2rem);width:420px"
         x-cloak>
        <img src="/images/pwa-icon-192.png" alt="" width="36" height="36" style="border-radius:.5rem">
        <div style="flex:1;min-width:0">
            <p style="font-size:.85rem;font-weight:600;color:#fff;margin:0">Instalar ProWay Lab</p>
            <p style="font-size:.75rem;color:#94a3b8;margin:0">Accede desde tu pantalla de inicio</p>
        </div>
        <button @click="install()" style="padding:.4rem 1rem;background:#00D9FF;color:#0C0C0F;
                font-weight:600;font-size:.8rem;border:none;border-radius:.375rem;cursor:pointer;white-space:nowrap">
            Instalar
        </button>
        <button @click="dismiss()" style="background:none;border:none;color:#64748b;cursor:pointer;
                font-size:1.1rem;padding:.25rem;line-height:1" aria-label="Cerrar">&times;</button>
    </div>

<!-- Scroll progress bar -->
<div id="scroll-progress"></div>

<div class="page flex">
    <!-- Mobile hamburger -->
    <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Menu"
            onclick="document.getElementById('sidebar').classList.toggle('is-open')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" x-data="{ open: false }" :class="{ 'is-open': open }">
        <div class="sidebar__logo">
            <img src="/images/imagotipo-proway-blanco.png" alt="PW" width="28" height="28">
            <span class="sidebar__logo-text">ProWay</span>
        </div>

        <nav class="sidebar__nav">
<span class="sidebar__section-title">Onboarding</span>

<a href="/onboarding" class="sidebar__link sidebar__link--active">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
    </span>
    Configurar marca
</a>

<a href="/portal" class="sidebar__link">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
    </span>
    Dashboard
</a>

<a href="/perfil" class="sidebar__link">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
        </svg>
    </span>
    Mi Perfil
</a>
        </nav>

        <div class="sidebar__footer">
            <!-- Notification bell -->
            <button class="notif-bell" id="notif-toggle" onclick="document.getElementById('notif-panel').classList.toggle('is-open')">
                <span class="notif-bell__icon" aria-hidden="true">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </span>
                Notificaciones
                <span class="notif-badge" id="notif-badge"
                      hx-get="/api/v1/notifications/unread-count"
                      hx-trigger="load, refreshBadge from:body, every 30s"
                      hx-swap="innerHTML"
                      hx-select-oob="false"
                      hx-on::after-request="var d=JSON.parse(event.detail.xhr.responseText);var c=d&&d.data?d.data.count:0;this.textContent=c>0?c:'';this.dataset.count=c;"></span>
            </button>

            <!-- Notification dropdown panel -->
            <div class="notif-panel" id="notif-panel">
                <div class="notif-panel__header">
                    <span class="notif-panel__title">Notificaciones</span>
                    <button class="notif-panel__mark-all"
                            onclick="fetch('/api/v1/notifications/mark-all-read',{method:'PATCH',credentials:'include'}).then(()=>{htmx.trigger('#notif-list','revealed');htmx.trigger('#notif-badge','refreshBadge')})">
                        Marcar todas
                    </button>
                </div>
                <div class="notif-panel__body" id="notif-list"
                     hx-get="/api/partials/notifications.php"
                     hx-trigger="revealed"
                     hx-swap="innerHTML">
                </div>
            </div>

<button class="btn btn--ghost btn--full"
        style="justify-content:flex-start; gap: var(--pw-space-2);"
        @click="fetch('/api/v1/auth/logout', {method:'POST', credentials:'include'}).then(() => window.location.href = '/login')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Cerrar Sesion
</button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main-with-sidebar page-content" id="main-content">
        <div class="page-header">
            <h1 class="page-title">Configurar mi marca</h1>
            <div class="flex gap-4"></div>
        </div>


<div id="onboarding-container"
     hx-get="/api/partials/onboarding-wizard.php"
     hx-trigger="load"
     hx-swap="innerHTML"
     hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>

    <!-- Loading skeleton -->
    <div style="max-width: 680px; margin: 0 auto;">
        <!-- Step indicator skeleton -->
        <div style="display: flex; justify-content: center; gap: var(--pw-space-8); margin-bottom: var(--pw-space-8);">
            <div style="display: flex; flex-direction: column; align-items: center; gap: var(--pw-space-2);">
                <div class="loading-skeleton" style="width: 40px; height: 40px; border-radius: 50%; background: var(--pw-panel); border: 2px solid var(--pw-border);"></div>
                <div class="loading-skeleton" style="width: 40px; height: 10px; border-radius: 4px; background: var(--pw-panel);"></div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: var(--pw-space-2);">
                <div class="loading-skeleton" style="width: 40px; height: 40px; border-radius: 50%; background: var(--pw-panel); border: 2px solid var(--pw-border);"></div>
                <div class="loading-skeleton" style="width: 40px; height: 10px; border-radius: 4px; background: var(--pw-panel);"></div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: var(--pw-space-2);">
                <div class="loading-skeleton" style="width: 40px; height: 40px; border-radius: 50%; background: var(--pw-panel); border: 2px solid var(--pw-border);"></div>
                <div class="loading-skeleton" style="width: 40px; height: 10px; border-radius: 4px; background: var(--pw-panel);"></div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: var(--pw-space-2);">
                <div class="loading-skeleton" style="width: 40px; height: 40px; border-radius: 50%; background: var(--pw-panel); border: 2px solid var(--pw-border);"></div>
                <div class="loading-skeleton" style="width: 40px; height: 10px; border-radius: 4px; background: var(--pw-panel);"></div>
            </div>
        </div>

        <!-- Panel skeleton -->
        <div class="loading-skeleton" style="background: var(--pw-panel); border: 1px solid var(--pw-border); border-radius: 12px; padding: var(--pw-space-8); min-height: 300px;">
            <div style="width: 160px; height: 20px; background: var(--pw-border); border-radius: 4px; margin-bottom: var(--pw-space-4);"></div>
            <div style="width: 300px; height: 14px; background: var(--pw-border); border-radius: 4px; margin-bottom: var(--pw-space-8);"></div>
            <div style="width: 100%; height: 44px; background: var(--pw-border); border-radius: 6px; margin-bottom: var(--pw-space-4);"></div>
            <div style="width: 100%; height: 44px; background: var(--pw-border); border-radius: 6px;"></div>
        </div>
    </div>
</div>

<style>
@keyframes pw-skeleton-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
}
.loading-skeleton { animation: pw-skeleton-pulse 1.5s ease-in-out infinite; }
</style>

<script>
/* Redirect to login on 401 */
document.body.addEventListener('htmx:responseError', function(evt) {
    if (evt.detail.xhr.status === 401) {
        window.location.href = '/login';
    }
});
</script>
    </main>
</div>

<script>
(function() {
    var bar = document.getElementById('scroll-progress');
    if (bar) {
        var main = document.getElementById('main-content');
        (main || window).addEventListener('scroll', function() {
            var el = main || document.documentElement;
            var scrollTop = main ? el.scrollTop : (window.pageYOffset || el.scrollTop);
            var scrollHeight = el.scrollHeight - el.clientHeight;
            bar.style.width = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) + '%' : '0%';
        });
    }
})();
</script>

    <!-- JS: HTMX + Alpine.js (injected by Vite) -->
    <script type="module" src="/dist/assets/main.js?v=3"></script>
</body>
</html>
