version: '3.8'

# ProWay Lab — n8n Automation Server
# Deploy on EasyPanel or any Docker host
# Accessible at: https://n8n.prowaylab.com (configure domain in EasyPanel)

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.prowaylab.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.prowaylab.com/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=WellCoreN8N2026
      - N8N_SECURE_COOKIE=true
      - GENERIC_TIMEZONE=America/Bogota
      - TZ=America/Bogota
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=WellCoreN8N2026
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - n8n-db

  n8n-db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=WellCoreN8N2026
    volumes:
      - n8n_db_data:/var/lib/postgresql/data

volumes:
  n8n_data:
  n8n_db_data:
