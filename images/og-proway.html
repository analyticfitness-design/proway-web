<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProWay Lab - OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; }

  .og-card {
    width: 1200px;
    height: 630px;
    background: #0C0C0F;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  /* Grid pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
  }

  /* Subtle radial glow */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    right: -100px;
    top: -100px;
    background: radial-gradient(circle, rgba(0,217,255,0.04) 0%, transparent 70%);
    z-index: 1;
  }

  /* Decorative large P */
  .deco-p {
    position: absolute;
    right: 40px;
    top: -30px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 520px;
    line-height: 1;
    color: rgba(0,217,255,0.05);
    z-index: 2;
    user-select: none;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    padding: 0 70px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Corner accents */
  .corner-tl, .corner-br {
    position: absolute;
    width: 30px;
    height: 30px;
    z-index: 20;
  }
  .corner-tl {
    top: 20px;
    left: 20px;
    border-top: 2px solid #00D9FF;
    border-left: 2px solid #00D9FF;
  }
  .corner-br {
    bottom: 20px;
    right: 20px;
    border-bottom: 2px solid #00D9FF;
    border-right: 2px solid #00D9FF;
  }

  /* Decorative dots */
  .dots {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .dots span {
    width: 7px;
    height: 7px;
    background: #00D9FF;
    display: block;
  }

  /* Label */
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 8px;
  }
  .label .cyan { color: #00D9FF; }

  /* Accent line */
  .accent-line {
    width: 50px;
    height: 3px;
    background: #00D9FF;
    margin-bottom: 36px;
  }

  /* Title */
  .title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1.15;
    color: #fff;
    margin-bottom: 24px;
    max-width: 680px;
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 19px;
    line-height: 1.6;
    color: #A1A1AA;
    max-width: 560px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    border-top: 2px solid #00D9FF;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 70px;
    z-index: 20;
  }
  .bottom-bar .url {
    font-family: 'Roboto Mono', monospace;
    font-size: 15px;
    color: #A1A1AA;
    letter-spacing: 1px;
  }
  .bottom-bar .tagline {
    font-family: 'Roboto Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="deco-p">P</div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
    <div class="label">PROWAY<span class="cyan">.LAB</span></div>
    <div class="accent-line"></div>
    <div class="title">Produccion de<br>contenido fitness</div>
    <div class="subtitle">Ingenieria de marcas para coaches<br>en Colombia y LATAM</div>
  </div>

  <div class="bottom-bar">
    <span class="url">prowaylab.com</span>
    <span class="tagline">Content Engineering</span>
  </div>
</div>
</body>
</html>
