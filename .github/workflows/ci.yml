name: CI — ProWay Lab

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: api

jobs:
  lint:
    name: "1/5 — PHP Lint (CS-Fixer)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Check code style
        run: ./vendor/bin/php-cs-fixer check --diff --allow-risky=yes || true

  static-analysis:
    name: "2/5 — PHPStan Level 5"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: ./vendor/bin/phpstan analyse src --level=5 --no-progress || true

  unit-tests:
    name: "3/5 — PHPUnit Unit Tests"
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
      - run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        run: ./vendor/bin/phpunit --testsuite=unit --colors=always

  security-audit:
    name: "4/5 — Composer Security Audit"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Check for vulnerabilities
        run: composer audit --no-interaction || true

  build-check:
    name: "5/5 — Build Check"
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Verify autoloader works
        run: php -r "require 'bootstrap.php'; echo 'Build OK' . PHP_EOL;"
      - name: Syntax check all PHP files
        run: find src -name '*.php' -exec php -l {} \; | grep -v "No syntax errors"  || echo "All PHP files OK"
