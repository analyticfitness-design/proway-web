name: Deploy — Production

on:
  push:
    branches: [main]

jobs:

  # ── Deploy via EasyPanel API (box service — git clone + build.sh) ─────────────
  deploy:
    name: Deploy to EasyPanel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://prowaylab.com

    steps:
      - name: Trigger EasyPanel rebuild
        env:
          EASYPANEL_PASSWORD: ${{ secrets.EASYPANEL_PASSWORD }}
        run: |
          if [ -z "$EASYPANEL_PASSWORD" ]; then
            echo "EASYPANEL_PASSWORD not configured — redeploy manually from EasyPanel."
            exit 0
          fi
          RESPONSE=$(curl -s -o /tmp/ep_response.txt -w "%{http_code}" \
            -X POST "https://panel.wellcorefitness.com/api/trpc/services.box.rebuildDockerImage" \
            -u "info@wellcorefitness.com:$EASYPANEL_PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{"json":{"projectName":"wellcorefitness","serviceName":"prowaylab"}}')
          echo "EasyPanel response: $RESPONSE"
          cat /tmp/ep_response.txt || true
          if [ "$RESPONSE" = "200" ]; then
            echo "EasyPanel rebuild triggered successfully."
          else
            echo "EasyPanel returned $RESPONSE — check EASYPANEL_PASSWORD secret or credentials."
            exit 1
          fi

      - name: Wait for build + health check
        run: |
          echo "Waiting 3min for EasyPanel build + deploy..."
          sleep 180
          for i in 1 2 3; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://prowaylab.com/api/health.php)
            echo "Attempt $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 20
          done
          echo "Health check could not confirm deployment (may still be building)"
          exit 0
