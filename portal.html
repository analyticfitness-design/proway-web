<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0C0C0F">
    <title>Mi Portal — ProWay Lab</title>
    <meta name="description" content="Dashboard de cliente ProWay Lab">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/imagotipo-proway-blanco.png">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ProWay Design System -->
    <link rel="stylesheet" href="/dist/assets/module.css?v=3">

</head>
<body>
    <div id="toast-container" aria-live="polite"></div>

<!-- Scroll progress bar -->
<div id="scroll-progress"></div>

<div class="page flex">
    <!-- Mobile hamburger -->
    <button class="mobile-menu-toggle" id="mobile-menu-btn" aria-label="Menu"
            onclick="document.getElementById('sidebar').classList.toggle('is-open')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" x-data="{ open: false }" :class="{ 'is-open': open }">
        <div class="sidebar__logo">
            <img src="/images/imagotipo-proway-blanco.png" alt="PW" width="28" height="28">
            <span class="sidebar__logo-text">ProWay</span>
        </div>

        <nav class="sidebar__nav">
<span class="sidebar__section-title">Mi Cuenta</span>

<a href="/portal" class="sidebar__link sidebar__link--active">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
    </span>
    Dashboard
</a>

<a href="/proyectos" class="sidebar__link">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
    </span>
    Mis Proyectos
</a>

<a href="/facturas" class="sidebar__link">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
    </span>
    Facturas
</a>

<a href="/perfil" class="sidebar__link">
    <span class="sidebar__link-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
        </svg>
    </span>
    Mi Perfil
</a>
        </nav>

        <div class="sidebar__footer">
            <!-- Notification bell -->
            <button class="notif-bell" id="notif-toggle" onclick="document.getElementById('notif-panel').classList.toggle('is-open')">
                <span class="notif-bell__icon" aria-hidden="true">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </span>
                Notificaciones
                <span class="notif-badge" id="notif-badge"
                      hx-get="/api/v1/notifications/unread-count"
                      hx-trigger="load, refreshBadge from:body, every 30s"
                      hx-swap="innerHTML"
                      hx-select-oob="false"
                      hx-on::after-request="var d=JSON.parse(event.detail.xhr.responseText);var c=d&&d.data?d.data.count:0;this.textContent=c>0?c:'';this.dataset.count=c;"></span>
            </button>

            <!-- Notification dropdown panel -->
            <div class="notif-panel" id="notif-panel">
                <div class="notif-panel__header">
                    <span class="notif-panel__title">Notificaciones</span>
                    <button class="notif-panel__mark-all"
                            onclick="fetch('/api/v1/notifications/mark-all-read',{method:'PATCH',credentials:'include'}).then(()=>{htmx.trigger('#notif-list','revealed');htmx.trigger('#notif-badge','refreshBadge')})">
                        Marcar todas
                    </button>
                </div>
                <div class="notif-panel__body" id="notif-list"
                     hx-get="/api/partials/notifications.php"
                     hx-trigger="revealed"
                     hx-swap="innerHTML">
                </div>
            </div>

<button class="btn btn--ghost btn--full"
        style="justify-content:flex-start; gap: var(--pw-space-2);"
        @click="fetch('/api/v1/auth/logout', {method:'POST', credentials:'include'}).then(() => window.location.href = '/login')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Cerrar Sesión
</button>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main-with-sidebar page-content" id="main-content">
        <div class="page-header">
            <h1 class="page-title">Mi Portal</h1>
            <div class="flex gap-4"><button class="btn btn--ghost btn--sm"
        hx-get="/api/partials/client-stats.php"
        hx-target="#client-stats"
        hx-swap="innerHTML"
        hx-headers='{"X-Requested-With": "XMLHttpRequest"}'
        title="Actualizar datos">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"
         style="transition: transform 0.4s;" class="htmx-request:rotate-180">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Actualizar
</button>
</div>
        </div>


<!-- Stats row -->
<div id="client-stats"
     hx-get="/api/partials/client-stats.php"
     hx-trigger="load"
     hx-swap="innerHTML"
     hx-headers='{"X-Requested-With": "XMLHttpRequest"}'
     hx-indicator="find .htmx-indicator"
     class="stats-grid">

    <!-- Skeleton placeholders while loading -->
    <div class="stat-card loading-skeleton" aria-hidden="true">
        <div class="stat-card__value" style="color: var(--pw-text-muted);">—</div>
        <div class="stat-card__label">Cargando...</div>
    </div>
    <div class="stat-card loading-skeleton" aria-hidden="true">
        <div class="stat-card__value" style="color: var(--pw-text-muted);">—</div>
        <div class="stat-card__label">Cargando...</div>
    </div>
    <div class="stat-card loading-skeleton" aria-hidden="true">
        <div class="stat-card__value" style="color: var(--pw-text-muted);">—</div>
        <div class="stat-card__label">Cargando...</div>
    </div>
</div>

<!-- Projects section -->
<div class="section-label">Proyectos Activos</div>
<div class="card">
    <div class="card__header">
        <h2 class="card__title">Proyectos Activos</h2>
        <div style="display:flex; align-items:center; gap: var(--pw-space-3);">
            <!-- Spinner indicator -->
            <span id="projects-spinner" class="htmx-indicator" aria-label="Cargando proyectos">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     style="animation: pw-spin 0.8s linear infinite; color: var(--pw-accent);" aria-hidden="true">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
            </span>
            <button class="btn btn--ghost btn--sm"
                    hx-get="/api/partials/project-list.php"
                    hx-target="#projects-list"
                    hx-swap="innerHTML"
                    hx-headers='{"X-Requested-With": "XMLHttpRequest"}'
                    hx-indicator="#projects-spinner"
                    title="Refrescar proyectos">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="projects-list"
         hx-get="/api/partials/project-list.php"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-headers='{"X-Requested-With": "XMLHttpRequest"}'
         hx-indicator="#projects-spinner">
        <p style="color: var(--pw-text-muted); padding: var(--pw-space-8) 0; text-align:center;">
            Cargando proyectos...
        </p>
    </div>

    <div class="card__footer" style="margin-top: var(--pw-space-4); padding-top: var(--pw-space-4); border-top: 1px solid var(--pw-border);">
        <a href="/facturas" class="btn btn--secondary btn--sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
            Ver todas las facturas
        </a>
    </div>
</div>

<style>
@keyframes pw-spin { to { transform: rotate(360deg); } }

/* Skeleton pulse */
@keyframes pw-skeleton-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
}
.loading-skeleton { animation: pw-skeleton-pulse 1.5s ease-in-out infinite; }

/* HTMX indicator — hidden by default, shown during request */
.htmx-indicator { opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.htmx-request .htmx-indicator,
.htmx-indicator.htmx-request { opacity: 1; }

.htmx-request:rotate-180 { transform: rotate(180deg); }
</style>

<script>
/* Redirect to login on any 401 response */
document.body.addEventListener('htmx:responseError', function(evt) {
    if (evt.detail.xhr.status === 401) {
        window.location.href = '/login';
    }
});
</script>
    </main>
</div>

<script>
(function() {
    var bar = document.getElementById('scroll-progress');
    if (bar) {
        var main = document.getElementById('main-content');
        (main || window).addEventListener('scroll', function() {
            var el = main || document.documentElement;
            var scrollTop = main ? el.scrollTop : (window.pageYOffset || el.scrollTop);
            var scrollHeight = el.scrollHeight - el.clientHeight;
            bar.style.width = scrollHeight > 0 ? (scrollTop / scrollHeight * 100) + '%' : '0%';
        });
    }
})();
</script>

    <!-- JS: HTMX + Alpine.js (injected by Vite) -->
    <script type="module" src="/dist/assets/main.js?v=3"></script>
</body>
</html>
