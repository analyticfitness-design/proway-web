<!-- PROWAY LAB CHAT WIDGET -->
<style>
  /* ============================================================
     PROWAY LAB CHAT WIDGET — v1.0
     Self-contained. Inject into <body> before </body>.
  ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400&display=swap');

  /* --- Pulse ring animation --- */
  @keyframes pw-pulse-ring {
    0%   { transform: scale(1);   opacity: 0.7; }
    100% { transform: scale(1.9); opacity: 0;   }
  }

  /* --- Online dot pulse --- */
  @keyframes pw-online-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
    50%       { box-shadow: 0 0 0 5px rgba(52, 211, 153, 0);  }
  }

  /* --- Panel slide-up / slide-down --- */
  @keyframes pw-panel-in {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  @keyframes pw-panel-out {
    from { transform: translateY(0);    opacity: 1; }
    to   { transform: translateY(20px); opacity: 0; }
  }

  /* --- Typing dots --- */
  @keyframes pw-dot-bounce {
    0%, 80%, 100% { transform: translateY(0);    }
    40%           { transform: translateY(-5px);  }
  }

  /* ---- Floating Button ---- */
  #pw-chat-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #00D9FF;
    border: none;
    cursor: pointer;
    z-index: 9990;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 4px 20px rgba(0, 217, 255, 0.35),
      0 2px 8px rgba(0, 0, 0, 0.5);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  #pw-chat-btn:hover {
    transform: scale(1.1);
    box-shadow:
      0 6px 28px rgba(0, 217, 255, 0.5),
      0 4px 12px rgba(0, 0, 0, 0.6);
  }

  #pw-chat-btn:active {
    transform: scale(0.97);
  }

  /* Pulse ring behind button */
  #pw-chat-btn::before {
    content: '';
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(0, 217, 255, 0.6);
    animation: pw-pulse-ring 2.2s ease-out infinite;
    pointer-events: none;
  }

  /* Second pulse ring (offset) */
  #pw-chat-btn::after {
    content: '';
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(0, 217, 255, 0.35);
    animation: pw-pulse-ring 2.2s ease-out 1.1s infinite;
    pointer-events: none;
  }

  /* SVG icons inside button */
  #pw-chat-btn .pw-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    transition: opacity 0.15s ease, transform 0.15s ease;
    position: absolute;
  }

  #pw-chat-btn .pw-icon-close {
    opacity: 0;
    transform: rotate(-90deg) scale(0.7);
  }

  #pw-chat-btn.pw-open .pw-icon-chat {
    opacity: 0;
    transform: rotate(90deg) scale(0.7);
  }

  #pw-chat-btn.pw-open .pw-icon-close {
    opacity: 1;
    transform: rotate(0deg) scale(1);
  }

  /* Pulse animation pauses when open */
  #pw-chat-btn.pw-open::before,
  #pw-chat-btn.pw-open::after {
    animation: none;
    opacity: 0;
  }

  /* Notification dot */
  #pw-notif-dot {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #E31E24;
    border: 2px solid #0C0C0F;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
    pointer-events: none;
  }

  #pw-notif-dot.pw-hidden {
    transform: scale(0);
    opacity: 0;
  }

  /* ---- Chat Panel ---- */
  #pw-chat-panel {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 320px;
    background: #111114;
    border: 1px solid #252528;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(0, 217, 255, 0.08);
    z-index: 9989;
    overflow: hidden;
    display: none;
    flex-direction: column;
    border-radius: 0;
  }

  #pw-chat-panel.pw-visible {
    display: flex;
    animation: pw-panel-in 0.35s ease forwards;
  }

  #pw-chat-panel.pw-hiding {
    display: flex;
    animation: pw-panel-out 0.25s ease forwards;
  }

  /* ---- Panel Header ---- */
  .pw-panel-header {
    height: 56px;
    min-height: 56px;
    background: #0C0C0F;
    border-bottom: 1px solid #252528;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px 0 16px;
    flex-shrink: 0;
  }

  .pw-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Online indicator */
  .pw-online-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #34D399;
    flex-shrink: 0;
    animation: pw-online-pulse 2s ease-in-out infinite;
  }

  .pw-header-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .pw-header-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #FFFFFF;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .pw-header-status {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    color: #A1A1AA;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  /* Close button */
  .pw-panel-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #A1A1AA;
    transition: color 0.15s ease, background 0.15s ease;
    flex-shrink: 0;
    padding: 0;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pw-panel-close:hover {
    color: #E31E24;
    background: rgba(227, 30, 36, 0.1);
  }

  .pw-panel-close svg {
    width: 14px;
    height: 14px;
  }

  /* ---- Panel Body ---- */
  .pw-panel-body {
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
    max-height: 340px;
    scrollbar-width: thin;
    scrollbar-color: #252528 transparent;
    flex: 1;
  }

  .pw-panel-body::-webkit-scrollbar {
    width: 4px;
  }

  .pw-panel-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .pw-panel-body::-webkit-scrollbar-thumb {
    background: #252528;
    border-radius: 2px;
  }

  /* Bot message sender label */
  .pw-msg-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    color: #00D9FF;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  /* Message bubble */
  .pw-msg-bubble {
    background: rgba(0, 217, 255, 0.07);
    border: 1px solid rgba(0, 217, 255, 0.18);
    border-radius: 0 12px 12px 12px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #FFFFFF;
    line-height: 1.55;
    max-width: 100%;
    word-break: break-word;
  }

  /* Timestamp */
  .pw-msg-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    color: #52525B;
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* Quick reply section */
  .pw-quick-replies {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 16px;
  }

  .pw-quick-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    color: #52525B;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* Quick reply button */
  .pw-qr-btn {
    width: 100%;
    background: transparent;
    border: 1px solid #252528;
    color: #A1A1AA;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    transition:
      border-color 0.15s ease,
      color 0.15s ease,
      background 0.15s ease,
      transform 0.1s ease;
    border-radius: 0;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 8px;
    line-height: 1.3;
  }

  .pw-qr-btn:hover {
    border-color: #00D9FF;
    color: #00D9FF;
    background: rgba(0, 217, 255, 0.06);
  }

  .pw-qr-btn:active {
    transform: scale(0.98);
  }

  .pw-qr-btn .pw-qr-emoji {
    flex-shrink: 0;
    font-size: 14px;
  }

  /* ---- Panel Footer ---- */
  .pw-panel-footer {
    border-top: 1px solid #252528;
    padding: 10px 16px;
    flex-shrink: 0;
    background: #0C0C0F;
  }

  .pw-footer-text {
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    color: #52525B;
    letter-spacing: 0.03em;
    text-align: center;
    line-height: 1.4;
  }

  .pw-footer-text span {
    color: #25D366;
    font-weight: 400;
  }

  /* ---- Mobile adjustments ---- */
  @media (max-width: 400px) {
    #pw-chat-panel {
      right: 12px;
      width: calc(100vw - 24px);
      bottom: 90px;
    }

    #pw-chat-btn {
      right: 16px;
      bottom: 16px;
    }
  }
</style>

<!-- Widget HTML (injected into body) -->

<!-- Floating button -->
<button id="pw-chat-btn" aria-label="Abrir chat ProWay Lab" aria-expanded="false">
  <!-- Chat icon -->
  <svg class="pw-icon pw-icon-chat" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  </svg>
  <!-- Close icon -->
  <svg class="pw-icon pw-icon-close" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  <div id="pw-notif-dot" aria-hidden="true">1</div>

<!-- Chat panel -->
<div id="pw-chat-panel" role="dialog" aria-label="Chat ProWay Lab" aria-modal="false">

  <!-- Header -->
  <div class="pw-panel-header">
    <div class="pw-header-left">

    </div>

        <path d="M13 1L1 13M1 1L13 13" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="pw-panel-body">
    <!-- Bot message -->
    <div class="pw-msg-label">PROWAY</div>
    <div class="pw-msg-bubble">
      Hola &#128075; Soy el asistente de ProWay Lab.<br>
      &#xFEFF;&#xFEFF;&#xFEFF;&iquest;En qu&eacute; podemos ayudarte hoy?
    </div>

    <div class="pw-quick-replies">

  <div class="pw-panel-footer">

    </p>
  </div>

</div>

<script>
  /* ============================================================
     PROWAY LAB CHAT WIDGET — JS Controller
  ============================================================ */
  (function () {
    'use strict';

    /* --- Element refs --- */
    var btn       = document.getElementById('pw-chat-btn');
    var panel     = document.getElementById('pw-chat-panel');
    var closeBtn  = document.getElementById('pw-close-btn');
    var notifDot  = document.getElementById('pw-notif-dot');
    var qrBtns    = document.querySelectorAll('.pw-qr-btn');

    /* --- State --- */
    var isOpen    = false;
    var hideTimer = null;

    /* --- Check if user has seen the chat before --- */
    var hasSeen = false;
    try {
      hasSeen = localStorage.getItem('pwlab_chat_seen') === 'true';
    } catch (e) { /* localStorage blocked (private mode, etc.) */ }

    if (hasSeen) {
      notifDot.classList.add('pw-hidden');
    }

    /* --- Open panel --- */
    function openPanel() {
      if (isOpen) return;
      isOpen = true;

      /* Clear any lingering hide animation */
      clearTimeout(hideTimer);
      panel.classList.remove('pw-hiding');
      panel.classList.add('pw-visible');

      btn.classList.add('pw-open');
      btn.setAttribute('aria-expanded', 'true');
      btn.setAttribute('aria-label', 'Cerrar chat ProWay Lab');

      /* Hide notification dot permanently */
      notifDot.classList.add('pw-hidden');
      try {
        localStorage.setItem('pwlab_chat_seen', 'true');
      } catch (e) { /* noop */ }
    }

    /* --- Close panel --- */
    function closePanel() {
      if (!isOpen) return;
      isOpen = false;

      /* Slide-down animation, then hide */
      panel.classList.remove('pw-visible');
      panel.classList.add('pw-hiding');

      hideTimer = setTimeout(function () {
        panel.classList.remove('pw-hiding');
      }, 260);

      btn.classList.remove('pw-open');
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-label', 'Abrir chat ProWay Lab');
    }

    /* --- Toggle --- */
    function togglePanel() {
      if (isOpen) {
        closePanel();
      } else {
        openPanel();
      }
    }

    /* --- Quick reply handler --- */
    function handleQuickReply(e) {
      var target = e.currentTarget;
      var action = target.getAttribute('data-action');
      var href   = target.getAttribute('data-href');

      if (!href) return;

      /* Visual feedback: briefly highlight the clicked button */
      target.style.borderColor = '#00D9FF';
      target.style.color = '#00D9FF';
      target.style.background = 'rgba(0,217,255,0.1)';

      if (action === 'whatsapp') {
        /* Open WhatsApp in new tab */
        setTimeout(function () {
          window.open(href, '_blank', 'noopener,noreferrer');
        }, 150);
      } else if (action === 'section') {
        /* Navigate to section */
        setTimeout(function () {
          window.location.href = href;
        }, 150);
      }

      /* Close panel after delay */
      setTimeout(function () {
        closePanel();
      }, 500);
    }

    /* --- Close on Escape key --- */
    function handleKeyDown(e) {
      if (e.key === 'Escape' && isOpen) {
        closePanel();
        btn.focus();
      }
    }

    /* --- Close when clicking outside panel and button --- */
    function handleOutsideClick(e) {
      if (!isOpen) return;
      if (panel.contains(e.target) || btn.contains(e.target)) return;
      closePanel();
    }

    /* --- Event listeners --- */
    btn.addEventListener('click', togglePanel);
    closeBtn.addEventListener('click', closePanel);
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('click', handleOutsideClick);

    qrBtns.forEach(function (qrBtn) {
      qrBtn.addEventListener('click', handleQuickReply);
    });

    /* --- Auto-open after delay on first visit (optional UX nudge) --- */
    /* Disabled by default. Uncomment to enable: */
    /*
    if (!hasSeen) {
      setTimeout(function () {
        if (!isOpen) openPanel();
      }, 5000);
    }
    */

  }());
</script>
<!-- END PROWAY LAB CHAT WIDGET -->
