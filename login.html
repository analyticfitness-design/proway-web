<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0C0C0F">
    <title>Iniciar Sesion — ProWay Lab</title>
    <meta name="description" content="Accede a tu portal de cliente ProWay Lab">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/imagotipo-proway-blanco.png">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/images/pwa-icon-192.png">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ProWay Design System -->
    <link rel="stylesheet" href="/dist/assets/module.css?v=3">

<style>
    /* Auth layout — hero background (landing style) */
    .auth-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: var(--pw-space-6);
        position: relative;
        overflow: hidden;
        background: #0C0C0F;
    }

    /* Animated grid */
    .auth-grid {
        position: absolute; inset: 0;
        background-image:
            linear-gradient(rgba(0,217,255,0.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,217,255,0.035) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(ellipse 85% 65% at 50% 50%, black 30%, transparent 100%);
        pointer-events: none;
    }

    /* Glow orb */
    .auth-orb {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 700px; height: 700px; border-radius: 50%;
        background: radial-gradient(circle, rgba(0,217,255,0.06) 0%, transparent 65%);
        pointer-events: none;
        animation: auth-orb-pulse 6s ease-in-out infinite;
    }
    @keyframes auth-orb-pulse {
        0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%,-50%) scale(1.06); }
    }

    /* Scan line */
    .auth-scan {
        position: absolute; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, #00D9FF, transparent);
        opacity: 0.25;
        animation: auth-scan 5s ease-in-out infinite;
        pointer-events: none;
    }
    @keyframes auth-scan {
        0% { top: 0%; }
        100% { top: 100%; }
    }

    /* Grain overlay */
    .auth-page::after {
        content: '';
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        background-size: 180px 180px;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.5;
    }

    /* Content wrapper */
    .auth-content {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
    }

    /* Logo */
    .auth-logo {
        text-align: center;
        margin-bottom: var(--pw-space-8);
    }
    .auth-logo-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: clamp(24px, 4vw, 32px);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #FFFFFF;
        text-decoration: none;
        display: inline-block;
    }
    .auth-logo-text b { color: #00D9FF; }

    /* Badge */
    .auth-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'Roboto Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: #00D9FF;
        border: 1px solid rgba(0,217,255,0.3);
        padding: 6px 14px;
        margin-bottom: var(--pw-space-6);
    }
    .auth-badge::before {
        content: '';
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #00D9FF;
        animation: auth-pulse 2.2s ease-in-out infinite;
    }
    @keyframes auth-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.35; transform: scale(0.6); }
    }
</style>
</head>
<body>
    <div id="toast-container" aria-live="polite"></div>

    <!-- PWA Install Banner -->
    <div x-data="pwaInstall" x-show="canInstall" x-transition.opacity
         style="position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:9999;
                background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid rgba(0,217,255,.25);
                border-radius:.75rem;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.75rem;
                box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:calc(100vw - 2rem);width:420px"
         x-cloak>
        <img src="/images/pwa-icon-192.png" alt="" width="36" height="36" style="border-radius:.5rem">
        <div style="flex:1;min-width:0">
            <p style="font-size:.85rem;font-weight:600;color:#fff;margin:0">Instalar ProWay Lab</p>
            <p style="font-size:.75rem;color:#94a3b8;margin:0">Accede desde tu pantalla de inicio</p>
        </div>
        <button @click="install()" style="padding:.4rem 1rem;background:#00D9FF;color:#0C0C0F;
                font-weight:600;font-size:.8rem;border:none;border-radius:.375rem;cursor:pointer;white-space:nowrap">
            Instalar
        </button>
        <button @click="dismiss()" style="background:none;border:none;color:#64748b;cursor:pointer;
                font-size:1.1rem;padding:.25rem;line-height:1" aria-label="Cerrar">&times;</button>
    </div>

<div class="auth-page">
    <div class="auth-grid"></div>
    <div class="auth-orb"></div>
    <div class="auth-scan"></div>

    <div class="auth-content">
        <div class="auth-logo">
            <a href="/" class="auth-logo-text">
                <b>Proway</b>.Lab
            </a>
        </div>

<div style="text-align:center; margin-bottom: var(--pw-space-5);">
    <span class="auth-badge">Sistema activo</span>
</div>

<div class="card" style="background: var(--pw-panel); border: 1px solid var(--pw-border);" x-data="{
    error: '',
    loading: false,
    async submit() {
        this.error = '';
        this.loading = true;
        const raw   = document.getElementById('email').value.trim();
        const pass  = document.getElementById('password').value;
        const body  = raw.includes('@')
            ? { email: raw, password: pass }
            : { username: raw, password: pass };
        try {
            const res  = await fetch('/api/v1/auth/login', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (data.success) {
                const type = data.data && data.data.user && data.data.user.type;
                window.location.href = type === 'admin' ? '/admin' : '/portal';
            } else {
                this.error = (data.error && data.error.message) || 'Credenciales incorrectas.';
                this.loading = false;
            }
        } catch(e) {
            this.error = 'Error de conexion. Intenta de nuevo.';
            this.loading = false;
        }
    }
}">
    <div style="text-align:center; padding-bottom: var(--pw-space-4);">
        <h2 style="font-family: var(--pw-font-display); font-size: var(--pw-text-xl); font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em;">
            Bienvenido de vuelta
        </h2>
        <p style="font-family: var(--pw-font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--pw-text-muted); margin-top: var(--pw-space-2);">
            Ingresa a tu portal de cliente
        </p>
    </div>

    <!-- Error alert -->
    <div x-show="error"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform -translate-y-1"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-cloak
         style="
             background: rgba(227,30,36,0.08);
             border: 1px solid rgba(227,30,36,0.25);
             border-radius: var(--pw-radius-sm);
             padding: var(--pw-space-3) var(--pw-space-4);
             margin-bottom: var(--pw-space-4);
             color: var(--pw-danger);
             font-size: var(--pw-text-sm);
             display: flex;
             align-items: center;
             gap: var(--pw-space-2);
         ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span x-text="error"></span>
    </div>

    <form id="login-form" @submit.prevent="submit()" novalidate>

        <div class="form-group">
            <label class="form-label" for="email" style="font-family: var(--pw-font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;">
                Correo electronico o usuario
            </label>
            <input class="form-input"
                   type="text"
                   id="email"
                   name="email"
                   placeholder="tu@email.com"
                   required
                   autocomplete="username"
                   inputmode="email"
                   style="background: var(--pw-dark);">
        </div>

        <div class="form-group">
            <label class="form-label" for="password" style="font-family: var(--pw-font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;">
                Contrasena
            </label>
            <input class="form-input"
                   type="password"
                   id="password"
                   name="password"
                   placeholder="••••••••"
                   required
                   autocomplete="current-password"
                   style="background: var(--pw-dark);">
        </div>

        <button type="submit"
                class="btn btn--primary btn--full"
                style="margin-top: var(--pw-space-6); position: relative;"
                :disabled="loading">
            <span x-show="loading" style="display:flex;align-items:center;gap:var(--pw-space-2);justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     style="animation: spin 0.8s linear infinite;" aria-hidden="true">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
                Ingresando...
            </span>
            <span x-show="!loading">Ingresar</span>
        </button>
    </form>

    <p style="text-align:center; margin-top: var(--pw-space-5); font-family: var(--pw-font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--pw-text-dim);">
        Problemas?
        <a href="mailto:hola@prowaylab.com" style="color: var(--pw-accent); text-decoration: none;">
            Contacta soporte
        </a>
    </p>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
[x-cloak] { display: none !important; }
.btn[disabled] { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
</style>

    </div>
</div>

    <!-- JS: HTMX + Alpine.js (injected by Vite) -->
    <script type="module" src="/dist/assets/main.js?v=3"></script>
</body>
</html>
