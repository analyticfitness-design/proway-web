<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <title>Iniciar Sesión — ProWay Lab</title>
    <meta name="description" content="Accede a tu portal de cliente ProWay Lab">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/imagotipo-proway-blanco.png">

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ProWay Design System -->
    <link rel="stylesheet" href="/dist/assets/module.css">

</head>
<body>
    <div id="toast-container" aria-live="polite"></div>

<div class="page" style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding: var(--pw-space-6);">
    <div style="width:100%; max-width:420px;">
        <div style="text-align:center; margin-bottom: var(--pw-space-8);">
            <a href="/">
                <img src="/images/logo-proway-blanco.png" alt="ProWay Lab" height="40" style="margin:0 auto;">
            </a>
        </div>

<div class="card" x-data="{
    error: '',
    loading: false,
    async handleResponse(event) {
        const xhr = event.detail.xhr;
        try {
            const data = JSON.parse(xhr.responseText);
            if (data.success) {
                const type = data.data && data.data.user && data.data.user.type;
                window.location.href = type === 'admin' ? '/admin' : '/portal';
            } else {
                this.error = (data.error && data.error.message) || 'Credenciales incorrectas. Inténtalo de nuevo.';
                this.loading = false;
            }
        } catch(e) {
            this.error = 'Error inesperado. Por favor, intenta de nuevo.';
            this.loading = false;
        }
    }
}">
    <div class="card__header" style="text-align:center; padding-bottom: var(--pw-space-4);">
        <h2 class="card__title" style="font-size: var(--pw-text-xl); font-weight: var(--pw-weight-semi);">Bienvenido de vuelta</h2>
        <p style="color: var(--pw-text-muted); font-size: var(--pw-text-sm); margin-top: var(--pw-space-1);">
            Ingresa a tu portal de cliente
        </p>
    </div>

    <!-- Error alert -->
    <div x-show="error"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 transform -translate-y-1"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-cloak
         style="
             background: rgba(255,71,87,0.1);
             border: 1px solid rgba(255,71,87,0.3);
             border-radius: var(--pw-radius-sm);
             padding: var(--pw-space-3) var(--pw-space-4);
             margin-bottom: var(--pw-space-4);
             color: var(--pw-danger);
             font-size: var(--pw-text-sm);
             display: flex;
             align-items: center;
             gap: var(--pw-space-2);
         ">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span x-text="error"></span>
    </div>

    <form id="login-form"
          hx-post="/api/v1/auth/login"
          hx-ext="json-enc"
          hx-headers='{"X-Requested-With": "XMLHttpRequest"}'
          hx-on::before-request="loading = true; error = ''"
          hx-on::after-request="handleResponse(event)"
          novalidate>

        <div class="form-group">
            <label class="form-label" for="email">Correo electrónico o usuario</label>
            <input class="form-input"
                   type="text"
                   id="email"
                   name="email"
                   placeholder="tu@email.com"
                   required
                   autocomplete="username"
                   inputmode="email">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                Contraseña
            </label>
            <input class="form-input"
                   type="password"
                   id="password"
                   name="password"
                   placeholder="••••••••"
                   required
                   autocomplete="current-password">
        </div>

        <button type="submit"
                class="btn btn--primary btn--full"
                style="margin-top: var(--pw-space-6); position: relative;"
                :disabled="loading">

            <!-- Loading state -->
            <span x-show="loading" style="display:flex; align-items:center; gap:var(--pw-space-2); justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     style="animation: spin 0.8s linear infinite;" aria-hidden="true">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
                Ingresando...
            </span>

            <!-- Default state -->
            <span x-show="!loading">Ingresar</span>
        </button>
    </form>

    <p style="text-align:center; margin-top: var(--pw-space-5); font-size: var(--pw-text-sm); color: var(--pw-text-muted);">
        ¿Problemas para acceder?
        <a href="mailto:hola@prowaylab.com"
           style="color: var(--pw-accent); text-decoration: none;"
           onmouseover="this.style.textDecoration='underline'"
           onmouseout="this.style.textDecoration='none'">
            Contacta soporte
        </a>
    </p>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
[x-cloak] { display: none !important; }

/* HTMX request state — disable button visually */
.btn[disabled] { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
</style>

<script>
/* If the user typed a username (no @), send it as `username` field instead of `email` */
document.getElementById('login-form').addEventListener('htmx:configRequest', function(evt) {
    var value = evt.detail.parameters['email'] || '';
    if (value && !value.includes('@')) {
        delete evt.detail.parameters['email'];
        evt.detail.parameters['username'] = value;
    }
});
</script>
    </div>
</div>

    <!-- JS: HTMX + Alpine.js (injected by Vite) -->
    <script type="module" src="/dist/assets/main.js"></script>
</body>
</html>
