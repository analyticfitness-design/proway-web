<VirtualHost *:80>
    ServerName _
    DocumentRoot /var/www/html
    DirectoryIndex index.html index.php

    <Directory /var/www/html>
        Options -Indexes -MultiViews
        AllowOverride None
        Require all granted

        # Rewrite: sirve /pagina como /pagina.html si existe
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME}.html -f
        RewriteRule ^(.+)$ $1.html [L]
    </Directory>

    # /api/ — PHP activo, sin índices
    <Directory /var/www/html/api>
        Options -Indexes
        AllowOverride None
        Require all granted
        # Pasar Authorization header a PHP (necesario para Bearer tokens)
        SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1
    </Directory>

    # Bloquear archivos ocultos (.env, .git, etc.)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Bloquear /logs/ y /test/
    <Location /logs/>
        Require all denied
    </Location>
    <Location /test/>
        Require all denied
    </Location>

    # Cache de estáticos 30 días
    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
