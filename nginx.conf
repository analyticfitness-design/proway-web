server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~ \.php$ {
        return 403;
    }

    location /api/ {
        return 403;
    }

    location ~ /\. {
        deny all;
    }

    location /test/ {
        return 403;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
