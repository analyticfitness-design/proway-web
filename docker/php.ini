; ProWay Lab — PHP production settings

; APCu in-process cache
extension=apcu
apc.enabled=1
apc.enable_cli=0
apc.shm_size=64M

; Security
expose_php=Off
display_errors=Off
log_errors=On
error_log=/dev/stderr

; Performance
max_execution_time=30
memory_limit=128M
upload_max_filesize=10M
post_max_size=12M

; Session security
session.cookie_httponly=1
session.cookie_secure=1
session.use_strict_mode=1
